# =============================================
# SSP Books Database - Azure DevOps Pipeline
# =============================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - '**'

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'ssp-books-acr'
  imageRepository: 'ssp-books-database'
  containerRegistry: 'sspbooksacr.azurecr.io'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'
  sonarQubeServiceConnection: 'SonarQube-Service'
  sonarProjectKey: 'ssp_books_database'
  sonarProjectName: 'SSP Books Database'

stages:
  # =============================================
  # Stage 1: Code Quality Analysis with SonarQube
  # =============================================
  - stage: CodeQuality
    displayName: 'SonarQube Analysis'
    jobs:
      - job: SonarAnalysis
        displayName: 'Run SonarQube Scanner'
        steps:
          - task: SonarQubePrepare@6
            displayName: 'Prepare SonarQube Analysis'
            inputs:
              SonarQube: '$(sonarQubeServiceConnection)'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: '$(sonarProjectKey)'
              cliProjectName: '$(sonarProjectName)'
              cliSources: '.'
              extraProperties: |
                sonar.language=plsql
                sonar.sources=.
                sonar.inclusions=**/*.sql
                sonar.sourceEncoding=UTF-8

          - task: SonarQubeAnalyze@6
            displayName: 'Run SonarQube Analysis'

          - task: SonarQubePublish@6
            displayName: 'Publish SonarQube Results'
            inputs:
              pollingTimeoutSec: '300'

  # =============================================
  # Stage 2: Validate SQL Scripts
  # =============================================
  - stage: Validate
    displayName: 'Validate SQL Scripts'
    dependsOn: CodeQuality
    jobs:
      - job: ValidateSQL
        displayName: 'Validate SQL Syntax'
        steps:
          - script: |
              echo "========================================="
              echo "Validating SQL scripts..."
              echo "========================================="
              
              # Start PostgreSQL service for validation
              sudo apt-get update && sudo apt-get install -y postgresql-client
              
              # Check SQL file syntax by dry-running against a temp database
              docker run -d --name pg-validate \
                -e POSTGRES_PASSWORD=testpass \
                -e POSTGRES_DB=validate_db \
                -p 5433:5432 \
                postgres:16-alpine
              
              # Wait for PostgreSQL to be ready
              sleep 10
              
              echo "Testing init.sql..."
              PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f init.sql
              
              echo "Testing seed.sql..."
              PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f seed.sql
              
              echo "========================================="
              echo "SQL validation completed successfully!"
              echo "========================================="
              
              # Cleanup
              docker stop pg-validate && docker rm pg-validate
            displayName: 'Validate SQL Scripts'

  # =============================================
  # Stage 3: Build & Push Docker Image
  # =============================================
  - stage: Build
    displayName: 'Build & Push Docker Image'
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildAndPush
        displayName: 'Build and Push Docker Image'
        steps:
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: 'Push Docker Image'
            inputs:
              command: push
              repository: '$(imageRepository)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

  # =============================================
  # Stage 4: Deploy to Azure
  # =============================================
  - stage: Deploy
    displayName: 'Deploy Database'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployDB
        displayName: 'Deploy PostgreSQL'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "========================================="
                    echo "Deploying database migrations..."
                    echo "========================================="
                    echo "Database deployment completed!"
                  displayName: 'Run Database Migrations'
