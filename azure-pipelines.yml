trigger:
branches:
include:
- main
- develop

pr:
branches:
include:
- main

pool:
vmImage: 'ubuntu-latest'

variables:
dockerRegistryServiceConnection: 'ssp-books-acr'
imageRepository: 'ssp-books-database'
containerRegistry: 'sspbooksacr.azurecr.io'
dockerfilePath: 'Dockerfile'
tag: '$(Build.BuildId)'
sonarQubeServiceConnection: 'SonarQube-Service'
sonarProjectKey: 'ssp_books_database'
sonarProjectName: 'SSP Books Database'

stages:

# =========================

# Stage 1: Setup Tools

# =========================

* stage: Setup
  displayName: Setup Environment
  jobs:

  * job: InstallTools
    displayName: Install Required Tools
    steps:

    * script: |
      echo "Installing tools..."

      sudo apt-get update
      sudo apt-get install -y docker.io postgresql-client curl unzip

      curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      docker --version
      psql --version
      az --version

      displayName: Install Tools

# =========================

# Stage 2: SonarQube

# =========================

* stage: CodeQuality
  displayName: SonarQube Analysis
  dependsOn: Setup
  jobs:

  * job: Sonar
    steps:

    * task: SonarQubePrepare@6
      inputs:
      SonarQube: '$(sonarQubeServiceConnection)'
      scannerMode: 'CLI'
      configMode: 'manual'
      cliProjectKey: '$(sonarProjectKey)'
      cliProjectName: '$(sonarProjectName)'
      cliSources: '.'
      extraProperties: |
      sonar.language=plsql
      sonar.sources=.
      sonar.inclusions=**/*.sql
      sonar.sourceEncoding=UTF-8

    * task: SonarQubeAnalyze@6

    * task: SonarQubePublish@6
      inputs:
      pollingTimeoutSec: '300'

# =========================

# Stage 3: Validate SQL

# =========================

* stage: Validate
  displayName: Validate SQL Scripts
  dependsOn: CodeQuality
  jobs:

  * job: ValidateSQL
    steps:

    * script: |
      echo "Starting PostgreSQL container..."

      docker run -d --name pg-validate 
      -e POSTGRES_PASSWORD=testpass 
      -e POSTGRES_DB=validate_db 
      -p 5433:5432 
      postgres:16-alpine

      sleep 10

      echo "Running init.sql"
      PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f init.sql

      echo "Running seed.sql"
      PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f seed.sql

      docker stop pg-validate
      docker rm pg-validate

      displayName: Validate SQL

# =========================

# Stage 4: Build & Push

# =========================

* stage: Build
  displayName: Build and Push Docker Image
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  * job: BuildPush
    steps:

    * task: Docker@2
      displayName: Build Image
      inputs:
      command: build
      repository: '$(imageRepository)'
      dockerfile: '$(dockerfilePath)'
      containerRegistry: '$(dockerRegistryServiceConnection)'
      tags: |
      $(tag)
      latest

    * task: Docker@2
      displayName: Push Image
      inputs:
      command: push
      repository: '$(imageRepository)'
      containerRegistry: '$(dockerRegistryServiceConnection)'
      tags: |
      $(tag)
      latest

# =========================

# Stage 5: Deploy

# =========================

* stage: Deploy
  displayName: Deploy Database
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  * job: DeployDB
    steps:

    * script: |
      echo "Deploying database..."
      echo "Deployment completed successfully!"
      displayName: Deploy Step
