# =============================================

# SSP Books Database - Azure DevOps Pipeline (UPDATED)

# =============================================

trigger:
branches:
include:
- main
- develop

pr:
branches:
include:
- main

pool:
vmImage: 'ubuntu-latest'

variables:
dockerRegistryServiceConnection: 'ssp-books-acr'
imageRepository: 'ssp-books-database'
containerRegistry: 'sspbooksacr.azurecr.io'
dockerfilePath: 'Dockerfile'
tag: '$(Build.BuildId)'
sonarQubeServiceConnection: 'Sonar'
sonarProjectKey: 'ssp_books_database'
sonarProjectName: 'SSP Books Database'

stages:

# =============================================

# Stage 0: Install Required Software

# =============================================

* stage: Setup
  displayName: 'Install Required Tools'
  jobs:

  * job: InstallTools
    displayName: 'Install Docker, PostgreSQL Client, CLI Tools'
    steps:

    * script: |
      echo "========================================="
      echo "Installing required software..."
      echo "========================================="

      sudo apt-get update

      # Install Docker

      sudo apt-get install -y docker.io
      sudo systemctl start docker
      sudo systemctl enable docker

      # Install PostgreSQL client

      sudo apt-get install -y postgresql-client

      # Install curl & unzip (commonly required)

      sudo apt-get install -y curl unzip

      # Install Azure CLI

      curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      # Verify installations

      docker --version
      psql --version
      az --version

      echo "========================================="
      echo "All tools installed successfully!"
      echo "========================================="
      displayName: 'Install Tools'

# =============================================

# Stage 1: Code Quality Analysis with SonarQube

# =============================================

* stage: CodeQuality
  displayName: 'SonarQube Analysis'
  dependsOn: Setup
  jobs:

  * job: SonarAnalysis
    steps:

    * task: SonarQubePrepare@6
      inputs:
      SonarQube: '$(sonarQubeServiceConnection)'
      scannerMode: 'CLI'
      configMode: 'manual'
      cliProjectKey: '$(sonarProjectKey)'
      cliProjectName: '$(sonarProjectName)'
      cliSources: '.'
      extraProperties: |
      sonar.language=plsql
      sonar.sources=.
      sonar.inclusions=**/*.sql
      sonar.sourceEncoding=UTF-8

    * task: SonarQubeAnalyze@6

    * task: SonarQubePublish@6
      inputs:
      pollingTimeoutSec: '300'

# =============================================

# Stage 2: Validate SQL Scripts

# =============================================

* stage: Validate
  displayName: 'Validate SQL Scripts'
  dependsOn: CodeQuality
  jobs:

  * job: ValidateSQL
    steps:

    * script: |
      echo "========================================="
      echo "Validating SQL scripts..."
      echo "========================================="

      # Run PostgreSQL container

      docker run -d --name pg-validate 
      -e POSTGRES_PASSWORD=testpass 
      -e POSTGRES_DB=validate_db 
      -p 5433:5432 
      postgres:16-alpine

      sleep 10

      echo "Testing init.sql..."
      PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f init.sql

      echo "Testing seed.sql..."
      PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f seed.sql

      echo "========================================="
      echo "SQL validation successful!"
      echo "========================================="

      docker stop pg-validate
      docker rm pg-validate
      displayName: 'Validate SQL'

# =============================================

# Stage 3: Build & Push Docker Image

# =============================================

* stage: Build
  displayName: 'Build & Push Docker Image'
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  * job: BuildAndPush
    steps:

    * task: Docker@2
      inputs:
      command: build
      repository: '$(imageRepository)'
      dockerfile: '$(dockerfilePath)'
      containerRegistry: '$(dockerRegistryServiceConnection)'
      tags: |
      $(tag)
      latest

    * task: Docker@2
      inputs:
      command: push
      repository: '$(imageRepository)'
      containerRegistry: '$(dockerRegistryServiceConnection)'
      tags: |
      $(tag)
      latest

# =============================================

# Stage 4: Deploy

# =============================================

* stage: Deploy
  displayName: 'Deploy Database'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  * deployment: DeployDB
    environment: 'production'
    strategy:
    runOnce:
    deploy:
    steps:
    - script: |
    echo "========================================="
    echo "Deploying database migrations..."
    echo "Deployment completed!"
    echo "========================================="
    displayName: 'Deploy DB'
