version: '3.8'

services:
  ssp_books_db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssp_books_postgres
    environment:
      POSTGRES_DB: ssp_books
      POSTGRES_USER: ssp_admin
      POSTGRES_PASSWORD: sspbooks2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssp_admin -d ssp_books"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
