# =============================================
# SonarQube Configuration - SSP Books Database
# =============================================

sonar.projectKey=ssp_books_database
sonar.projectName=SSP Books Database
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=.
sonar.inclusions=**/*.sql

# Language
sonar.language=plsql

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
